services:
  api:
    image: cr.alkhwarizmi.online/free-switch:${IMAGE_TAG:-local}
    build:
      context: ../..
      dockerfile: MicroServicesCore/contact-center.web/backend/csharp/FreeSwitchXmlCurl/Dockerfile
    container_name: free-switch-xml-curl
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MongoDB__ConnectionString: ${MONGO_URI:-mongodb://host.docker.internal:27017/}
      MongoDB__DatabaseName: ${MONGO_DATABASE:-voiceflow}
      Jwt__Issuer: ${JWT_ISSUER:-voiceflow-studio}
      Jwt__Audience: ${JWT_AUDIENCE:-voiceflow-clients}
      Jwt__AccessTokenExpiryMinutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:-60}
      Jwt__RefreshTokenExpiryDays: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-30}
    ports:
      - "15219:8080"
